<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slay</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <link rel="stylesheet" href="xterm/xterm.css">
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0 16px 16px;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Courier Prime', 'Courier New', monospace;
      box-sizing: border-box;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      flex-shrink: 0;
      margin: 8px 0 4px;
    }
    h1 {
      color: #ebdfca;
      margin: 0;
      font-size: 2rem;
      font-family: 'Imperial Script', cursive;
      font-weight: normal;
      letter-spacing: 0.05em;
    }
    #github-link {
      color: #ebdfca88;
      font-size: 0.75rem;
      text-decoration: none;
      font-family: 'Courier Prime', 'Courier New', monospace;
      transition: color 0.15s;
      white-space: nowrap;
      padding-left: 1rem;
    }
    #github-link:hover {
      color: #ebdfca;
    }
    #terminal {
      flex: 1;
      width: 100%;
      background: #0a0a0a;
      overflow: hidden;
      visibility: hidden;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚔️ Slay</h1>
    <a id="github-link" href="https://github.com/chloebrett/slay" target="_blank" rel="noopener">github.com/chloebrett/slay</a>
  </header>
  <div id="terminal"></div>
  <script src="xterm/xterm.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
